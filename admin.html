<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Edit Konten</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:        #0f0f10;
            --panel:     #18181a;
            --panel-2:   #1f1f22;
            --border:    #2a2a2e;
            --text:      #f5f5f5;
            --text-dim:  #9ca3af;
            --text-mute: #6b7280;
            --accent:    #4ade80;
            --danger:    #ef4444;
        }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 14px; line-height: 1.5; }

        /* ── Login screen ── */
        .login-wrap {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 32px 28px;
            width: 100%;
            max-width: 380px;
        }
        .login-card h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .login-card .sub {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 24px;
        }
        .login-card .form-row { margin-bottom: 14px; }
        .login-card label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-dim);
            margin-bottom: 5px;
        }
        .login-card input {
            width: 100%;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font: inherit;
            outline: none;
            transition: border-color .15s;
        }
        .login-card input:focus { border-color: var(--accent); }
        .login-card .err {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 14px;
            display: none;
        }
        .login-card .err.show { display: block; }
        .login-card button {
            width: 100%;
            background: var(--accent);
            color: #052e16;
            border: 0;
            padding: 11px 16px;
            border-radius: 8px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s;
            margin-top: 6px;
        }
        .login-card button:hover:not(:disabled) { opacity: .9; }
        .login-card button:disabled { opacity: .4; cursor: wait; }
        .login-card .hint {
            margin-top: 16px;
            padding: 10px 12px;
            background: rgba(74, 222, 128, 0.06);
            border: 1px solid rgba(74, 222, 128, 0.18);
            border-radius: 8px;
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.6;
        }
        .login-card .hint code { font-family: ui-monospace, Menlo, monospace; color: var(--accent); }

        /* ── App layout ── */
        .layout { display: grid; grid-template-columns: minmax(380px, 480px) 1fr; height: 100vh; }
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .preview-pane { background: #fff; display: flex; flex-direction: column; }

        header.bar {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--panel-2);
            display: flex; align-items: center; gap: 10px;
        }
        header.bar h1 { font-size: 15px; font-weight: 600; flex: 1; }
        header.bar .meta { font-size: 12px; color: var(--text-dim); margin-right: 4px; }
        button {
            background: var(--accent);
            color: #052e16;
            border: 0;
            padding: 8px 16px;
            border-radius: 8px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s;
        }
        button:hover:not(:disabled) { opacity: .9; }
        button:disabled { opacity: .4; cursor: wait; }
        button.ghost {
            background: transparent; color: var(--text-dim); border: 1px solid var(--border); font-weight: 500;
        }
        button.ghost:hover:not(:disabled) { background: var(--panel-2); color: var(--text); }
        button.danger {
            background: transparent; color: #fca5a5; border: 1px solid rgba(239,68,68,.3); font-weight: 500;
        }
        button.danger:hover:not(:disabled) { background: rgba(239,68,68,.1); color: #fecaca; }

        .form-area { flex: 1; overflow-y: auto; padding: 14px 20px 80px; }
        details.section {
            margin-bottom: 12px;
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        details.section[open] { border-color: #3a3a3e; }
        details.section.account { border-color: rgba(74, 222, 128, 0.3); }
        details.section summary {
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 600;
            list-style: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
        }
        details.section summary::-webkit-details-marker { display: none; }
        details.section summary::after {
            content: '▾';
            font-size: 11px;
            color: var(--text-mute);
            transition: transform .2s;
        }
        details.section[open] summary::after { transform: rotate(180deg); }
        details.section summary .count {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-mute);
            margin-left: 8px;
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 999px;
        }
        details.section summary .dirty-dot {
            display: none;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            margin-left: 6px;
        }
        details.section.dirty summary .dirty-dot { display: inline-block; }
        .fields { padding: 4px 16px 16px; }
        .field { margin-bottom: 14px; }
        .field label {
            display: block;
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 5px;
        }
        .field .key-hint {
            font-family: ui-monospace, Menlo, monospace;
            font-size: 10px;
            color: var(--text-mute);
            margin-left: 6px;
            text-transform: none;
            letter-spacing: 0;
        }
        .field input, .field textarea {
            width: 100%;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 12px;
            font: inherit;
            outline: none;
            transition: border-color .15s;
            resize: vertical;
        }
        .field input:focus, .field textarea:focus { border-color: var(--accent); }
        .field.dirty input, .field.dirty textarea { border-color: var(--accent); }
        .field.notfound input, .field.notfound textarea { border-color: var(--danger); background: rgba(239, 68, 68, .05); }
        .field.notfound::after {
            content: 'Selector tidak menemukan elemen — periksa admin-schema.json';
            display: block;
            color: var(--danger);
            font-size: 11px;
            margin-top: 3px;
        }
        .field textarea { min-height: 60px; font-family: inherit; }
        .field-row { display: flex; gap: 8px; }
        .field-row .field { flex: 1; }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--panel-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity .2s, transform .2s;
            pointer-events: none;
            z-index: 100;
            max-width: 400px;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { border-color: var(--danger); color: #fca5a5; }
        .toast.success { border-color: var(--accent); color: var(--accent); }

        .preview-toolbar {
            padding: 10px 16px;
            background: var(--panel-2);
            border-bottom: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .preview-toolbar a {
            color: var(--text-dim);
            text-decoration: none;
            font-family: ui-monospace, Menlo, monospace;
        }
        .preview-toolbar a:hover { color: var(--text); }
        iframe.preview { flex: 1; width: 100%; border: 0; background: #fff; }
        .loading { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 13px; }
        .hidden { display: none !important; }

        .account-hint {
            background: rgba(74, 222, 128, 0.06);
            border: 1px solid rgba(74, 222, 128, 0.18);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 14px;
        }
        .account-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-wrap hidden">
    <form id="login-form" class="login-card" autocomplete="off">
        <h1>Admin — Login</h1>
        <p class="sub">Editor konten preview-home.html</p>

        <div class="err" id="login-error"></div>

        <div class="form-row">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" name="username" autocomplete="username" required>
        </div>
        <div class="form-row">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" id="login-submit">Masuk</button>

        <div class="hint">
            Login default pertama kali: <code>admin</code> / <code>admin</code>.<br>
            Setelah login, segera ganti via section <strong>"Pengaturan Akun"</strong>.
        </div>
    </form>
</div>

<!-- EDITOR SCREEN -->
<div id="editor-screen" class="layout hidden">
    <aside class="sidebar">
        <header class="bar">
            <h1>Edit Konten</h1>
            <span class="meta" id="dirty-count">0 perubahan</span>
            <button class="ghost" id="btn-refresh" type="button" title="Reload dari file">↻</button>
            <button id="btn-save" type="button" disabled>Simpan</button>
            <button class="danger" id="btn-logout" type="button" title="Keluar">Keluar</button>
        </header>
        <div class="form-area" id="form-area">
            <div class="loading">Memuat schema &amp; konten…</div>
        </div>
    </aside>

    <main class="preview-pane">
        <div class="preview-toolbar">
            <span>Preview</span>
            <a href="/" target="_blank">/ ↗</a>
            <a href="/mobile" target="_blank">/mobile ↗</a>
            <span style="flex:1"></span>
            <span id="auth-user">—</span>
            <span id="last-saved">—</span>
        </div>
        <iframe id="preview" class="preview" src="/preview-home.html"></iframe>
    </main>
</div>

<div class="toast" id="toast"></div>

<script>
    const loginScreen   = document.getElementById('login-screen');
    const editorScreen  = document.getElementById('editor-screen');
    const loginForm     = document.getElementById('login-form');
    const loginErr      = document.getElementById('login-error');
    const loginSubmit   = document.getElementById('login-submit');
    const loginUser     = document.getElementById('login-username');
    const loginPass     = document.getElementById('login-password');

    const formArea      = document.getElementById('form-area');
    const btnSave       = document.getElementById('btn-save');
    const btnRefresh    = document.getElementById('btn-refresh');
    const btnLogout     = document.getElementById('btn-logout');
    const dirtyCnt      = document.getElementById('dirty-count');
    const preview       = document.getElementById('preview');
    const lastSaved     = document.getElementById('last-saved');
    const authUser      = document.getElementById('auth-user');
    const toast         = document.getElementById('toast');

    let originalValues = {};
    let dirtyKeys      = new Set();
    let currentUsername = '';

    // ─── Toast ───────────────────────────────────────────
    function showToast(msg, kind = '') {
        toast.textContent = msg;
        toast.className = 'toast show' + (kind ? ' ' + kind : '');
        clearTimeout(showToast._t);
        showToast._t = setTimeout(() => { toast.classList.remove('show'); }, 3500);
    }

    // ─── Auth ────────────────────────────────────────────
    async function checkAuth() {
        try {
            const res = await fetch('/api/auth-status', { cache: 'no-store' });
            const data = await res.json();
            if (data.authenticated) {
                currentUsername = data.username;
                authUser.textContent = 'login: ' + data.username;
                loginScreen.classList.add('hidden');
                editorScreen.classList.remove('hidden');
                await loadContent();
            } else {
                loginScreen.classList.remove('hidden');
                editorScreen.classList.add('hidden');
                setTimeout(() => loginUser.focus(), 50);
            }
        } catch (err) {
            loginErr.textContent = 'Tidak bisa hubungi server: ' + err.message;
            loginErr.classList.add('show');
        }
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        loginErr.classList.remove('show');
        loginSubmit.disabled = true;
        loginSubmit.textContent = 'Memproses…';
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: loginUser.value, password: loginPass.value }),
            });
            const data = await res.json();
            if (!res.ok || !data.ok) {
                loginErr.textContent = data.error || ('HTTP ' + res.status);
                loginErr.classList.add('show');
            } else {
                loginPass.value = '';
                await checkAuth();
            }
        } catch (err) {
            loginErr.textContent = err.message;
            loginErr.classList.add('show');
        } finally {
            loginSubmit.disabled = false;
            loginSubmit.textContent = 'Masuk';
        }
    });

    btnLogout.addEventListener('click', async () => {
        if (dirtyKeys.size > 0 && !confirm(`Ada ${dirtyKeys.size} perubahan belum disimpan. Yakin keluar?`)) return;
        await fetch('/api/logout', { method: 'POST' });
        dirtyKeys.clear();
        originalValues = {};
        currentUsername = '';
        await checkAuth();
    });

    // ─── Form rendering ──────────────────────────────────
    function updateDirty() {
        const n = dirtyKeys.size;
        dirtyCnt.textContent = `${n} perubahan`;
        btnSave.disabled = n === 0;
        document.querySelectorAll('details.section').forEach(d => {
            const hasDirty = Array.from(d.querySelectorAll('[data-key]')).some(el => dirtyKeys.has(el.dataset.key));
            d.classList.toggle('dirty', hasDirty);
        });
    }

    function makeField(field) {
        const wrap = document.createElement('div');
        wrap.className = 'field';
        if (!field.found) wrap.classList.add('notfound');

        const lbl = document.createElement('label');
        lbl.textContent = field.label;
        const hint = document.createElement('span');
        hint.className = 'key-hint';
        hint.textContent = field.key + (field.html ? ' · HTML' : field.textOnly ? ' · text-only' : '');
        lbl.appendChild(hint);
        wrap.appendChild(lbl);

        const input = field.type === 'textarea'
            ? document.createElement('textarea')
            : document.createElement('input');
        if (input.tagName === 'INPUT') input.type = 'text';
        input.value = field.value;
        input.dataset.key = field.key;
        if (field.type === 'textarea') input.rows = Math.min(8, Math.max(2, Math.ceil((field.value.length || 20) / 60)));

        originalValues[field.key] = field.value;
        input.addEventListener('input', () => {
            if (input.value !== originalValues[field.key]) {
                dirtyKeys.add(field.key);
                wrap.classList.add('dirty');
            } else {
                dirtyKeys.delete(field.key);
                wrap.classList.remove('dirty');
            }
            updateDirty();
        });
        wrap.appendChild(input);
        return wrap;
    }

    function makeSection(section) {
        const det = document.createElement('details');
        det.className = 'section';
        det.dataset.sectionId = section.id;
        if (section.id === 'hero') det.open = true;

        const sum = document.createElement('summary');
        const title = document.createElement('span');
        title.textContent = section.title;
        const count = document.createElement('span'); count.className = 'count'; count.textContent = `${section.fields.length} field`;
        const dot   = document.createElement('span'); dot.className = 'dirty-dot';
        sum.appendChild(title);
        const right = document.createElement('span');
        right.style.display = 'flex'; right.style.alignItems = 'center';
        right.appendChild(count); right.appendChild(dot);
        sum.appendChild(right);
        det.appendChild(sum);

        const fields = document.createElement('div');
        fields.className = 'fields';
        section.fields.forEach(f => fields.appendChild(makeField(f)));
        det.appendChild(fields);
        return det;
    }

    // ─── Account settings section (pinned at top) ────────
    function makeAccountSection() {
        const det = document.createElement('details');
        det.className = 'section account';
        det.dataset.sectionId = '_account';

        const sum = document.createElement('summary');
        sum.innerHTML = '<span>🔐 Pengaturan Akun (login: <span id="acc-user-label"></span>)</span><span style="display:flex;align-items:center"><span class="count">3 field</span></span>';
        det.appendChild(sum);

        const fields = document.createElement('div');
        fields.className = 'fields';
        fields.innerHTML = `
            <div class="account-hint">
                Username baru opsional. Password baru opsional (minimal 4 karakter). Password lama wajib diisi untuk konfirmasi.
            </div>
            <div class="field">
                <label>Password lama (wajib)</label>
                <input type="password" id="acc-current" autocomplete="current-password">
            </div>
            <div class="field">
                <label>Username baru (opsional, kosong = tidak diubah)</label>
                <input type="text" id="acc-new-user" autocomplete="username">
            </div>
            <div class="field">
                <label>Password baru (opsional, kosong = tidak diubah)</label>
                <input type="password" id="acc-new-pass" autocomplete="new-password">
            </div>
            <div class="account-actions">
                <button type="button" id="btn-save-account">Simpan kredensial</button>
                <button type="button" class="ghost" id="btn-clear-account">Bersihkan</button>
            </div>
        `;
        det.appendChild(fields);

        // Wire up after DOM insertion (handled later)
        return det;
    }

    function wireAccountSection() {
        const userLabel = document.getElementById('acc-user-label');
        if (userLabel) userLabel.textContent = currentUsername;

        const elCur  = document.getElementById('acc-current');
        const elU    = document.getElementById('acc-new-user');
        const elP    = document.getElementById('acc-new-pass');
        const btnA   = document.getElementById('btn-save-account');
        const btnClr = document.getElementById('btn-clear-account');

        btnClr.addEventListener('click', () => { elCur.value=''; elU.value=''; elP.value=''; });

        btnA.addEventListener('click', async () => {
            const currentPassword = elCur.value;
            const newUsername     = elU.value.trim();
            const newPassword     = elP.value;
            if (!currentPassword) { showToast('Password lama wajib diisi', 'error'); return; }
            if (!newUsername && !newPassword) { showToast('Username dan password baru kosong — tidak ada yang diubah', 'error'); return; }
            if (newPassword && newPassword.length < 4) { showToast('Password baru minimal 4 karakter', 'error'); return; }

            btnA.disabled = true; btnA.textContent = 'Menyimpan…';
            try {
                const res = await fetch('/api/change-credentials', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ currentPassword, newUsername: newUsername || undefined, newPassword: newPassword || undefined }),
                });
                const data = await res.json();
                if (!res.ok || !data.ok) throw new Error(data.error || 'Gagal');
                currentUsername = data.username;
                authUser.textContent = 'login: ' + data.username;
                if (userLabel) userLabel.textContent = data.username;
                elCur.value=''; elU.value=''; elP.value='';
                showToast('Kredensial tersimpan' + (newPassword ? ' (sesi lain logout otomatis)' : ''), 'success');
            } catch (err) {
                showToast('Gagal simpan kredensial: ' + err.message, 'error');
            } finally {
                btnA.disabled = false; btnA.textContent = 'Simpan kredensial';
            }
        });
    }

    async function loadContent() {
        formArea.innerHTML = '<div class="loading">Memuat schema &amp; konten…</div>';
        originalValues = {};
        dirtyKeys.clear();
        try {
            const res = await fetch('/api/content', { cache: 'no-store' });
            if (res.status === 401) { await checkAuth(); return; }
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            formArea.innerHTML = '';

            // Account section first
            formArea.appendChild(makeAccountSection());
            wireAccountSection();

            // Then content sections
            if (data.sections && data.sections.length) {
                data.sections.forEach(s => formArea.appendChild(makeSection(s)));
            }
            updateDirty();
        } catch (err) {
            formArea.innerHTML = `<div class="loading">Gagal load: ${err.message}</div>`;
            showToast('Gagal load konten: ' + err.message, 'error');
        }
    }

    async function save() {
        if (dirtyKeys.size === 0) return;
        const changes = {};
        document.querySelectorAll('[data-key]').forEach(el => {
            if (dirtyKeys.has(el.dataset.key)) changes[el.dataset.key] = el.value;
        });

        btnSave.disabled = true;
        btnSave.textContent = 'Menyimpan…';
        try {
            const res = await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ changes }),
            });
            if (res.status === 401) { await checkAuth(); return; }
            const data = await res.json();
            if (!res.ok || !data.ok) throw new Error(data.error || 'Save failed');

            showToast(`Tersimpan: ${data.applied.length} field${data.skipped.length ? ` · ${data.skipped.length} di-skip` : ''}`, 'success');

            for (const k of data.applied) {
                const el = document.querySelector(`[data-key="${k}"]`);
                if (el) originalValues[k] = el.value;
            }
            dirtyKeys.clear();
            document.querySelectorAll('.field.dirty').forEach(f => f.classList.remove('dirty'));
            updateDirty();
            lastSaved.textContent = 'tersimpan ' + new Date().toLocaleTimeString('id-ID');

            preview.src = '/preview-home.html?t=' + Date.now();
        } catch (err) {
            showToast('Gagal simpan: ' + err.message, 'error');
        } finally {
            btnSave.textContent = 'Simpan';
            btnSave.disabled = dirtyKeys.size === 0;
        }
    }

    btnSave.addEventListener('click', save);
    btnRefresh.addEventListener('click', () => loadContent());

    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); save(); }
    });

    window.addEventListener('beforeunload', (e) => {
        if (dirtyKeys.size > 0) { e.preventDefault(); e.returnValue = ''; }
    });

    checkAuth();
</script>
</body>
</html>
