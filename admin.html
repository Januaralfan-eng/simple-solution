<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Edit Konten</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:        #0f0f10;
            --panel:     #18181a;
            --panel-2:   #1f1f22;
            --border:    #2a2a2e;
            --text:      #f5f5f5;
            --text-dim:  #9ca3af;
            --text-mute: #6b7280;
            --accent:    #4ade80;
            --danger:    #ef4444;
        }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 14px; line-height: 1.5; }

        /* ── Login screen ── */
        .login-wrap {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 32px 28px;
            width: 100%;
            max-width: 380px;
        }
        .login-card h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .login-card .sub {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 24px;
        }
        .login-card .form-row { margin-bottom: 14px; }
        .login-card label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-dim);
            margin-bottom: 5px;
        }
        .login-card input {
            width: 100%;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font: inherit;
            outline: none;
            transition: border-color .15s;
        }
        .login-card input:focus { border-color: var(--accent); }
        .login-card .err {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 14px;
            display: none;
        }
        .login-card .err.show { display: block; }
        .login-card button {
            width: 100%;
            background: var(--accent);
            color: #052e16;
            border: 0;
            padding: 11px 16px;
            border-radius: 8px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s;
            margin-top: 6px;
        }
        .login-card button:hover:not(:disabled) { opacity: .9; }
        .login-card button:disabled { opacity: .4; cursor: wait; }
        .login-card .hint {
            margin-top: 16px;
            padding: 10px 12px;
            background: rgba(74, 222, 128, 0.06);
            border: 1px solid rgba(74, 222, 128, 0.18);
            border-radius: 8px;
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.6;
        }
        .login-card .hint code { font-family: ui-monospace, Menlo, monospace; color: var(--accent); }

        /* ── App layout ── */
        .layout { display: grid; grid-template-columns: minmax(380px, 480px) 1fr; height: 100vh; }
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .preview-pane { background: #fff; display: flex; flex-direction: column; }

        header.bar {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--panel-2);
            display: flex; align-items: center; gap: 10px;
        }
        header.bar h1 { font-size: 15px; font-weight: 600; flex: 1; }
        header.bar .meta { font-size: 12px; color: var(--text-dim); margin-right: 4px; }
        button {
            background: var(--accent);
            color: #052e16;
            border: 0;
            padding: 8px 16px;
            border-radius: 8px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s;
        }
        button:hover:not(:disabled) { opacity: .9; }
        button:disabled { opacity: .4; cursor: wait; }
        button.ghost {
            background: transparent; color: var(--text-dim); border: 1px solid var(--border); font-weight: 500;
        }
        button.ghost:hover:not(:disabled) { background: var(--panel-2); color: var(--text); }
        button.danger {
            background: transparent; color: #fca5a5; border: 1px solid rgba(239,68,68,.3); font-weight: 500;
        }
        button.danger:hover:not(:disabled) { background: rgba(239,68,68,.1); color: #fecaca; }

        .form-area { flex: 1; overflow-y: auto; padding: 14px 20px 80px; }
        details.section {
            margin-bottom: 12px;
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        details.section[open] { border-color: #3a3a3e; }
        details.section.account { border-color: rgba(74, 222, 128, 0.3); }
        details.section summary {
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 600;
            list-style: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
        }
        details.section summary::-webkit-details-marker { display: none; }
        details.section summary::after {
            content: '▾';
            font-size: 11px;
            color: var(--text-mute);
            transition: transform .2s;
        }
        details.section[open] summary::after { transform: rotate(180deg); }
        details.section summary .count {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-mute);
            margin-left: 8px;
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 999px;
        }
        details.section summary .dirty-dot {
            display: none;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            margin-left: 6px;
        }
        details.section.dirty summary .dirty-dot { display: inline-block; }
        .fields { padding: 4px 16px 16px; }
        .field { margin-bottom: 14px; }
        .field label {
            display: block;
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 5px;
        }
        .field .key-hint {
            font-family: ui-monospace, Menlo, monospace;
            font-size: 10px;
            color: var(--text-mute);
            margin-left: 6px;
            text-transform: none;
            letter-spacing: 0;
        }
        .field input, .field textarea {
            width: 100%;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 12px;
            font: inherit;
            outline: none;
            transition: border-color .15s;
            resize: vertical;
        }
        .field input:focus, .field textarea:focus { border-color: var(--accent); }
        .field.dirty input, .field.dirty textarea { border-color: var(--accent); }
        .field.notfound input, .field.notfound textarea { border-color: var(--danger); background: rgba(239, 68, 68, .05); }
        .field.notfound::after {
            content: 'Selector tidak menemukan elemen — periksa admin-schema.json';
            display: block;
            color: var(--danger);
            font-size: 11px;
            margin-top: 3px;
        }
        .field textarea { min-height: 60px; font-family: inherit; }
        .field-row { display: flex; gap: 8px; }
        .field-row .field { flex: 1; }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--panel-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity .2s, transform .2s;
            pointer-events: none;
            z-index: 100;
            max-width: 400px;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { border-color: var(--danger); color: #fca5a5; }
        .toast.success { border-color: var(--accent); color: var(--accent); }

        .preview-toolbar {
            padding: 10px 16px;
            background: var(--panel-2);
            border-bottom: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .preview-toolbar a {
            color: var(--text-dim);
            text-decoration: none;
            font-family: ui-monospace, Menlo, monospace;
        }
        .preview-toolbar a:hover { color: var(--text); }
        iframe.preview { flex: 1; width: 100%; border: 0; background: #fff; }
        .loading { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 13px; }
        .hidden { display: none !important; }

        .account-hint {
            background: rgba(74, 222, 128, 0.06);
            border: 1px solid rgba(74, 222, 128, 0.18);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 14px;
        }
        .account-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        /* ── Invoice section ── */
        details.section.invoice { border-color: rgba(74, 222, 128, 0.3); }
        .invoice-hint {
            background: rgba(74, 222, 128, 0.06);
            border: 1px solid rgba(74, 222, 128, 0.18);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 14px;
        }
        .inv-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .inv-row .field { flex: 1; margin-bottom: 0; }
        .inv-section-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin: 16px 0 8px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .inv-section-label:first-of-type { margin-top: 0; padding-top: 0; border-top: 0; }
        .inv-items { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .inv-item-row {
            display: grid;
            grid-template-columns: 1fr 56px 90px 90px 28px;
            gap: 6px;
            align-items: center;
        }
        .inv-item-row input {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 7px 8px;
            font: inherit;
            font-size: 12px;
            width: 100%;
            outline: none;
        }
        .inv-item-row input:focus { border-color: var(--accent); }
        .inv-item-subtotal {
            font-size: 12px;
            color: var(--text-dim);
            text-align: right;
            padding-right: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .inv-item-remove {
            background: transparent;
            border: 1px solid rgba(239,68,68,.3);
            color: #fca5a5;
            border-radius: 6px;
            width: 28px;
            height: 28px;
            padding: 0;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
        }
        .inv-item-remove:hover { background: rgba(239,68,68,.1); }
        .inv-add-row {
            padding: 6px 12px;
            font-size: 12px;
            align-self: flex-start;
        }
        .inv-totals {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .inv-totals-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 12px; color: var(--text-dim); }
        .inv-totals-row input { width: 130px; text-align: right; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font: inherit; font-size: 12px; }
        .inv-totals-row.grand { font-size: 14px; font-weight: 700; color: var(--text); padding-top: 6px; border-top: 1px solid var(--border); }
        .inv-totals-row.grand span:last-child { color: var(--accent); }
        .inv-print-btn { width: 100%; margin-top: 14px; }

        /* ── Printable invoice template (hidden on screen, shown via print) ── */
        #invoice-print-area { display: none; }
        @media print {
            body * { visibility: hidden; }
            #invoice-print-area, #invoice-print-area * { visibility: visible; }
            #invoice-print-area {
                display: block;
                position: absolute;
                top: 0; left: 0;
                width: 100%;
                padding: 24px 32px;
                font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif;
                color: #111;
                background: #fff;
            }
            .inv-doc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
            .inv-doc-logo { display: flex; align-items: center; gap: 8px; }
            .inv-doc-logo img { width: 32px; height: 32px; object-fit: contain; }
            .inv-doc-logo span { font-weight: 700; font-size: 16px; }
            .inv-doc-title { text-align: right; }
            .inv-doc-title h1 { font-size: 22px; letter-spacing: 0.05em; margin-bottom: 4px; }
            .inv-doc-title div { font-size: 12px; color: #555; }
            .inv-doc-parties { display: flex; justify-content: space-between; gap: 24px; margin-bottom: 24px; }
            .inv-doc-parties > div { flex: 1; font-size: 12px; color: #333; white-space: pre-line; line-height: 1.6; }
            .inv-doc-parties h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 6px; }
            table.inv-doc-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 12px; }
            table.inv-doc-table th { text-align: left; border-bottom: 2px solid #111; padding: 6px 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: #555; }
            table.inv-doc-table td { padding: 8px; border-bottom: 1px solid #ddd; }
            table.inv-doc-table th:nth-child(2), table.inv-doc-table td:nth-child(2),
            table.inv-doc-table th:nth-child(3), table.inv-doc-table td:nth-child(3),
            table.inv-doc-table th:nth-child(4), table.inv-doc-table td:nth-child(4) { text-align: right; }
            .inv-doc-totals { display: flex; justify-content: flex-end; margin-bottom: 24px; }
            .inv-doc-totals table { font-size: 12px; }
            .inv-doc-totals td { padding: 4px 8px; }
            .inv-doc-totals td:first-child { color: #555; text-align: right; }
            .inv-doc-totals td:last-child { text-align: right; min-width: 120px; }
            .inv-doc-totals tr.grand td { font-weight: 700; font-size: 15px; border-top: 2px solid #111; padding-top: 8px; }
            .inv-doc-notes { font-size: 11px; color: #555; white-space: pre-line; line-height: 1.6; border-top: 1px solid #ddd; padding-top: 12px; }
            @page { size: A4; margin: 14mm; }
        }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-wrap hidden">
    <form id="login-form" class="login-card" autocomplete="off">
        <h1>Admin — Login</h1>
        <p class="sub">Editor konten preview-home.html</p>

        <div class="err" id="login-error"></div>

        <div class="form-row">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" name="username" autocomplete="username" required>
        </div>
        <div class="form-row">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" id="login-submit">Masuk</button>

        <div class="hint">
            Login default pertama kali: <code>admin</code> / <code>admin</code>.<br>
            Setelah login, segera ganti via section <strong>"Pengaturan Akun"</strong>.
        </div>
    </form>
</div>

<!-- EDITOR SCREEN -->
<div id="editor-screen" class="layout hidden">
    <aside class="sidebar">
        <header class="bar">
            <h1>Edit Konten</h1>
            <span class="meta" id="dirty-count">0 perubahan</span>
            <button class="ghost" id="btn-refresh" type="button" title="Reload dari file">↻</button>
            <button id="btn-save" type="button" disabled>Simpan</button>
            <button class="danger" id="btn-logout" type="button" title="Keluar">Keluar</button>
        </header>
        <div class="form-area" id="form-area">
            <div class="loading">Memuat schema &amp; konten…</div>
        </div>
    </aside>

    <main class="preview-pane">
        <div class="preview-toolbar">
            <span>Preview</span>
            <a href="/" target="_blank">/ ↗</a>
            <a href="/mobile" target="_blank">/mobile ↗</a>
            <span style="flex:1"></span>
            <span id="auth-user">—</span>
            <span id="last-saved">—</span>
        </div>
        <iframe id="preview" class="preview" src="/preview-home.html"></iframe>
    </main>
</div>

<div class="toast" id="toast"></div>
<div id="invoice-print-area"></div>

<script>
    const loginScreen   = document.getElementById('login-screen');
    const editorScreen  = document.getElementById('editor-screen');
    const loginForm     = document.getElementById('login-form');
    const loginErr      = document.getElementById('login-error');
    const loginSubmit   = document.getElementById('login-submit');
    const loginUser     = document.getElementById('login-username');
    const loginPass     = document.getElementById('login-password');

    const formArea      = document.getElementById('form-area');
    const btnSave       = document.getElementById('btn-save');
    const btnRefresh    = document.getElementById('btn-refresh');
    const btnLogout     = document.getElementById('btn-logout');
    const dirtyCnt      = document.getElementById('dirty-count');
    const preview       = document.getElementById('preview');
    const lastSaved     = document.getElementById('last-saved');
    const authUser      = document.getElementById('auth-user');
    const toast         = document.getElementById('toast');

    let originalValues = {};
    let dirtyKeys      = new Set();
    let currentUsername = '';

    // ─── Toast ───────────────────────────────────────────
    function showToast(msg, kind = '') {
        toast.textContent = msg;
        toast.className = 'toast show' + (kind ? ' ' + kind : '');
        clearTimeout(showToast._t);
        showToast._t = setTimeout(() => { toast.classList.remove('show'); }, 3500);
    }

    // ─── Auth ────────────────────────────────────────────
    async function checkAuth() {
        try {
            const res = await fetch('/api/auth-status', { cache: 'no-store' });
            const data = await res.json();
            if (data.authenticated) {
                currentUsername = data.username;
                authUser.textContent = 'login: ' + data.username;
                loginScreen.classList.add('hidden');
                editorScreen.classList.remove('hidden');
                await loadContent();
            } else {
                loginScreen.classList.remove('hidden');
                editorScreen.classList.add('hidden');
                setTimeout(() => loginUser.focus(), 50);
            }
        } catch (err) {
            loginErr.textContent = 'Tidak bisa hubungi server: ' + err.message;
            loginErr.classList.add('show');
        }
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        loginErr.classList.remove('show');
        loginSubmit.disabled = true;
        loginSubmit.textContent = 'Memproses…';
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: loginUser.value, password: loginPass.value }),
            });
            const data = await res.json();
            if (!res.ok || !data.ok) {
                loginErr.textContent = data.error || ('HTTP ' + res.status);
                loginErr.classList.add('show');
            } else {
                loginPass.value = '';
                await checkAuth();
            }
        } catch (err) {
            loginErr.textContent = err.message;
            loginErr.classList.add('show');
        } finally {
            loginSubmit.disabled = false;
            loginSubmit.textContent = 'Masuk';
        }
    });

    btnLogout.addEventListener('click', async () => {
        if (dirtyKeys.size > 0 && !confirm(`Ada ${dirtyKeys.size} perubahan belum disimpan. Yakin keluar?`)) return;
        await fetch('/api/logout', { method: 'POST' });
        dirtyKeys.clear();
        originalValues = {};
        currentUsername = '';
        await checkAuth();
    });

    // ─── Form rendering ──────────────────────────────────
    function updateDirty() {
        const n = dirtyKeys.size;
        dirtyCnt.textContent = `${n} perubahan`;
        btnSave.disabled = n === 0;
        document.querySelectorAll('details.section').forEach(d => {
            const hasDirty = Array.from(d.querySelectorAll('[data-key]')).some(el => dirtyKeys.has(el.dataset.key));
            d.classList.toggle('dirty', hasDirty);
        });
    }

    function makeField(field) {
        const wrap = document.createElement('div');
        wrap.className = 'field';
        if (!field.found) wrap.classList.add('notfound');

        const lbl = document.createElement('label');
        lbl.textContent = field.label;
        const hint = document.createElement('span');
        hint.className = 'key-hint';
        hint.textContent = field.key
            + (field.html ? ' · HTML' : field.textOnly ? ' · text-only' : '')
            + (field.attribute ? ` · attr=${field.attribute}` : '')
            + (field.multi ? ' · multi' : '');
        lbl.appendChild(hint);
        wrap.appendChild(lbl);

        if (field.type === 'image') {
            wrap.appendChild(makeImageField(field));
            return wrap;
        }

        const input = field.type === 'textarea'
            ? document.createElement('textarea')
            : document.createElement('input');
        if (input.tagName === 'INPUT') input.type = 'text';
        input.value = field.value;
        input.dataset.key = field.key;
        if (field.type === 'textarea') input.rows = Math.min(8, Math.max(2, Math.ceil((field.value.length || 20) / 60)));

        originalValues[field.key] = field.value;
        input.addEventListener('input', () => {
            if (input.value !== originalValues[field.key]) {
                dirtyKeys.add(field.key);
                wrap.classList.add('dirty');
            } else {
                dirtyKeys.delete(field.key);
                wrap.classList.remove('dirty');
            }
            updateDirty();
        });
        wrap.appendChild(input);
        return wrap;
    }

    function makeImageField(field) {
        // Image field: hidden text input + preview + file upload + url input + clear button
        const container = document.createElement('div');
        container.style.cssText = 'display:flex;flex-direction:column;gap:8px';

        // Hidden text input that holds the actual value (URL)
        const hidden = document.createElement('input');
        hidden.type = 'hidden';
        hidden.dataset.key = field.key;
        hidden.value = field.value || '';
        originalValues[field.key] = field.value || '';

        // Preview area
        const preview = document.createElement('div');
        preview.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;min-height:60px';

        const img = document.createElement('img');
        img.style.cssText = 'width:48px;height:48px;object-fit:contain;background:repeating-conic-gradient(#333 0% 25%, #222 0% 50%) 0/8px 8px;border-radius:6px;flex-shrink:0';
        img.alt = 'preview';
        img.src = field.value || '';
        img.onerror = () => { img.style.opacity = '0.3'; };

        const status = document.createElement('div');
        status.style.cssText = 'flex:1;font-size:12px;color:var(--text-dim);min-width:0;word-break:break-all';
        status.textContent = field.value ? field.value : '(belum ada gambar — pakai fallback letter)';

        preview.appendChild(img);
        preview.appendChild(status);
        container.appendChild(preview);

        // File input
        const fileWrap = document.createElement('div');
        fileWrap.style.cssText = 'display:flex;gap:6px;align-items:center';
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/png,image/jpeg,image/gif,image/webp,image/svg+xml';
        fileInput.style.cssText = 'flex:1;font-size:12px;color:var(--text-dim)';

        const uploadBtn = document.createElement('button');
        uploadBtn.type = 'button';
        uploadBtn.textContent = 'Upload';
        uploadBtn.disabled = true;
        uploadBtn.style.cssText = 'padding:6px 12px;font-size:12px';

        const clearBtn = document.createElement('button');
        clearBtn.type = 'button';
        clearBtn.className = 'ghost';
        clearBtn.textContent = 'Kosongkan';
        clearBtn.style.cssText = 'padding:6px 12px;font-size:12px';

        fileWrap.appendChild(fileInput);
        fileWrap.appendChild(uploadBtn);
        fileWrap.appendChild(clearBtn);
        container.appendChild(fileWrap);

        fileInput.addEventListener('change', () => {
            uploadBtn.disabled = fileInput.files.length === 0;
        });

        uploadBtn.addEventListener('click', async () => {
            const file = fileInput.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) {
                showToast(`File ${(file.size/1024/1024).toFixed(1)} MB melebihi batas 2 MB`, 'error');
                return;
            }
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Mengunggah…';
            try {
                const dataUri = await new Promise((resolve, reject) => {
                    const r = new FileReader();
                    r.onload = () => resolve(r.result);
                    r.onerror = reject;
                    r.readAsDataURL(file);
                });
                const res = await fetch('/api/upload-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filename: file.name,
                        data:     dataUri,
                        slot:     field.uploadSlot || undefined,
                    }),
                });
                const data = await res.json();
                if (!res.ok || !data.ok) throw new Error(data.error || 'Upload gagal');

                hidden.value = data.url;
                img.src = data.url;
                img.style.opacity = '1';
                status.textContent = `Tersimpan: ${data.url} · commit ${data.commitSha}`;
                dirtyKeys.add(field.key);
                container.parentElement.classList.add('dirty');
                updateDirty();
                showToast(`Upload berhasil: ${data.url}`, 'success');
            } catch (err) {
                showToast('Upload gagal: ' + err.message, 'error');
            } finally {
                uploadBtn.disabled = fileInput.files.length === 0;
                uploadBtn.textContent = 'Upload';
            }
        });

        clearBtn.addEventListener('click', () => {
            hidden.value = '';
            img.src = '';
            img.style.opacity = '0.3';
            status.textContent = '(kosong — akan pakai fallback letter setelah disimpan)';
            if (originalValues[field.key] !== '') {
                dirtyKeys.add(field.key);
                container.parentElement.classList.add('dirty');
            } else {
                dirtyKeys.delete(field.key);
                container.parentElement.classList.remove('dirty');
            }
            updateDirty();
        });

        container.appendChild(hidden);
        return container;
    }

    function makeSection(section) {
        const det = document.createElement('details');
        det.className = 'section';
        det.dataset.sectionId = section.id;
        if (section.id === 'hero') det.open = true;

        const isList    = !!section.listConfig;
        const itemCount = isList ? (section.items?.length || 0) : 0;
        const totalFields = (section.fields?.length || 0) + (isList ? itemCount * (section.items[0]?.fields.length || 0) : 0);

        const sum = document.createElement('summary');
        const title = document.createElement('span');
        title.textContent = section.title + (isList ? ` (${itemCount} ${section.listConfig.itemLabel.toLowerCase()})` : '');
        const count = document.createElement('span'); count.className = 'count'; count.textContent = `${totalFields} field`;
        const dot   = document.createElement('span'); dot.className = 'dirty-dot';
        sum.appendChild(title);
        const right = document.createElement('span');
        right.style.display = 'flex'; right.style.alignItems = 'center';
        right.appendChild(count); right.appendChild(dot);
        sum.appendChild(right);
        det.appendChild(sum);

        const fields = document.createElement('div');
        fields.className = 'fields';

        // Static header fields first
        (section.fields || []).forEach(f => fields.appendChild(makeField(f)));

        // List section: add [+ Tambah] button + per-item subgroups
        if (isList) {
            const addBar = document.createElement('div');
            addBar.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:10px;background:var(--bg);border:1px dashed var(--border);border-radius:8px;margin-bottom:12px';
            const lbl = document.createElement('span');
            lbl.style.cssText = 'font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.04em';
            lbl.textContent = `${section.listConfig.itemLabel} (${itemCount}/${section.listConfig.max})`;
            const addBtn = document.createElement('button');
            addBtn.type = 'button';
            addBtn.textContent = `+ Tambah ${section.listConfig.itemLabel}`;
            addBtn.disabled = itemCount >= section.listConfig.max;
            addBtn.style.cssText = 'padding:6px 12px;font-size:12px';
            addBtn.addEventListener('click', () => addListItem(section.id, addBtn));
            addBar.appendChild(lbl);
            addBar.appendChild(addBtn);
            fields.appendChild(addBar);

            (section.items || []).forEach((item, i) => {
                const itemBox = document.createElement('div');
                itemBox.style.cssText = 'padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;margin-bottom:12px';

                const itemHeader = document.createElement('div');
                itemHeader.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)';
                const itemTitle = document.createElement('span');
                itemTitle.style.cssText = 'font-weight:600;font-size:13px';
                itemTitle.textContent = `${section.listConfig.itemLabel} #${i + 1}`;
                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'danger';
                removeBtn.textContent = '× Hapus';
                removeBtn.disabled = itemCount <= section.listConfig.min;
                removeBtn.style.cssText = 'padding:4px 10px;font-size:11px';
                removeBtn.addEventListener('click', () => removeListItem(section.id, i, removeBtn));
                itemHeader.appendChild(itemTitle);
                itemHeader.appendChild(removeBtn);
                itemBox.appendChild(itemHeader);

                item.fields.forEach(f => itemBox.appendChild(makeField(f)));
                fields.appendChild(itemBox);
            });
        }

        det.appendChild(fields);
        return det;
    }

    async function addListItem(sectionId, btn) {
        if (dirtyKeys.size > 0 && !confirm('Ada perubahan belum disimpan — tetap tambah item baru? (perubahan akan tetap aman karena disimpan terpisah)')) return;
        btn.disabled = true;
        btn.textContent = 'Menambah…';
        try {
            const res = await fetch('/api/list-add', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ section: sectionId }),
            });
            const data = await res.json();
            if (!res.ok || !data.ok) throw new Error(data.error || 'Gagal');
            showToast(`Item baru #${data.newIndex + 1} ditambahkan · commit ${data.commitSha} · Vercel rebuild ~30 dtk`, 'success');
            // Reload content to show new item
            await loadContent();
        } catch (err) {
            showToast('Gagal tambah: ' + err.message, 'error');
            btn.disabled = false;
            btn.textContent = '+ Tambah';
        }
    }

    async function removeListItem(sectionId, index, btn) {
        if (!confirm(`Hapus item #${index + 1}? Tindakan ini tidak bisa di-undo (tapi tetap ada di history Git).`)) return;
        btn.disabled = true;
        btn.textContent = 'Menghapus…';
        try {
            const res = await fetch('/api/list-remove', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ section: sectionId, index }),
            });
            const data = await res.json();
            if (!res.ok || !data.ok) throw new Error(data.error || 'Gagal');
            showToast(`Item #${index + 1} dihapus · commit ${data.commitSha}`, 'success');
            await loadContent();
        } catch (err) {
            showToast('Gagal hapus: ' + err.message, 'error');
            btn.disabled = false;
            btn.textContent = '× Hapus';
        }
    }

    function wireAccountSection() {
        const userLabel = document.getElementById('acc-user-label');
        if (userLabel) userLabel.textContent = currentUsername;

        const elCur  = document.getElementById('acc-current');
        const elU    = document.getElementById('acc-new-user');
        const elP    = document.getElementById('acc-new-pass');
        const btnA   = document.getElementById('btn-save-account');
        const btnClr = document.getElementById('btn-clear-account');

        btnClr.addEventListener('click', () => { elCur.value=''; elU.value=''; elP.value=''; });

        btnA.addEventListener('click', async () => {
            const currentPassword = elCur.value;
            const newUsername     = elU.value.trim();
            const newPassword     = elP.value;
            if (!currentPassword) { showToast('Password lama wajib diisi', 'error'); return; }
            if (!newUsername && !newPassword) { showToast('Username dan password baru kosong — tidak ada yang diubah', 'error'); return; }
            if (newPassword && newPassword.length < 4) { showToast('Password baru minimal 4 karakter', 'error'); return; }

            btnA.disabled = true; btnA.textContent = 'Menyimpan…';
            try {
                const res = await fetch('/api/change-credentials', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ currentPassword, newUsername: newUsername || undefined, newPassword: newPassword || undefined }),
                });
                const data = await res.json();
                if (!res.ok || !data.ok) throw new Error(data.error || 'Gagal');
                currentUsername = data.username;
                authUser.textContent = 'login: ' + data.username;
                if (userLabel) userLabel.textContent = data.username;
                elCur.value=''; elU.value=''; elP.value='';
                showToast('Kredensial tersimpan' + (newPassword ? ' (sesi lain logout otomatis)' : ''), 'success');
            } catch (err) {
                showToast('Gagal simpan kredensial: ' + err.message, 'error');
            } finally {
                btnA.disabled = false; btnA.textContent = 'Simpan kredensial';
            }
        });
    }

    // ─── Invoice section (pinned, no persistence — print/PDF only) ──
    function formatRupiah(n) {
        n = Math.round(Number(n) || 0);
        return 'Rp ' + n.toLocaleString('id-ID');
    }

    function parseNum(v) {
        return parseFloat(String(v || '0').replace(/[^\d.-]/g, '')) || 0;
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str == null ? '' : str;
        return div.innerHTML;
    }

    function recalcInvoiceTotals() {
        const itemsContainer = document.getElementById('inv-items');
        if (!itemsContainer) return;
        let subtotal = 0;
        itemsContainer.querySelectorAll('.inv-item-row').forEach(row => {
            const qty = parseNum(row.querySelector('.inv-item-qty').value);
            const price = parseNum(row.querySelector('.inv-item-price').value);
            const lineTotal = qty * price;
            row.querySelector('.inv-item-subtotal').textContent = formatRupiah(lineTotal);
            subtotal += lineTotal;
        });
        const discount = parseNum(document.getElementById('inv-discount').value);
        const grand = Math.max(0, subtotal - discount);
        document.getElementById('inv-subtotal').textContent = formatRupiah(subtotal);
        document.getElementById('inv-grand-total').textContent = formatRupiah(grand);
    }

    function makeInvoiceItemRow(item) {
        item = item || { desc: '', qty: 1, price: '' };
        const row = document.createElement('div');
        row.className = 'inv-item-row';

        const desc = document.createElement('input');
        desc.type = 'text'; desc.placeholder = 'Deskripsi item'; desc.value = item.desc; desc.className = 'inv-item-desc';

        const qty = document.createElement('input');
        qty.type = 'text'; qty.inputMode = 'numeric'; qty.placeholder = 'Qty'; qty.value = item.qty; qty.className = 'inv-item-qty';

        const price = document.createElement('input');
        price.type = 'text'; price.inputMode = 'numeric'; price.placeholder = 'Harga'; price.value = item.price; price.className = 'inv-item-price';

        const subtotal = document.createElement('div');
        subtotal.className = 'inv-item-subtotal';
        subtotal.textContent = formatRupiah(0);

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button'; removeBtn.className = 'inv-item-remove'; removeBtn.textContent = '×';
        removeBtn.title = 'Hapus item';
        removeBtn.addEventListener('click', () => { row.remove(); recalcInvoiceTotals(); });

        [desc, qty, price].forEach(el => el.addEventListener('input', recalcInvoiceTotals));

        row.appendChild(desc); row.appendChild(qty); row.appendChild(price); row.appendChild(subtotal); row.appendChild(removeBtn);
        return row;
    }

    function buildPrintableInvoice() {
        const area = document.getElementById('invoice-print-area');
        const fromName    = document.getElementById('inv-from-name').value || 'Simple Solution';
        const fromContact = document.getElementById('inv-from-contact').value || '';
        const toName      = document.getElementById('inv-to-name').value || '';
        const toContact   = document.getElementById('inv-to-contact').value || '';
        const number      = document.getElementById('inv-number').value || '';
        const date        = document.getElementById('inv-date').value || '';
        const due         = document.getElementById('inv-due').value || '';
        const notes       = document.getElementById('inv-notes').value || '';
        const discount    = parseNum(document.getElementById('inv-discount').value);

        const rows = Array.from(document.querySelectorAll('#inv-items .inv-item-row'));
        let subtotal = 0;
        const itemsHtml = rows.map(row => {
            const desc  = row.querySelector('.inv-item-desc').value.trim();
            const qty   = parseNum(row.querySelector('.inv-item-qty').value);
            const price = parseNum(row.querySelector('.inv-item-price').value);
            if (!desc || qty <= 0) return '';
            const lineTotal = qty * price;
            subtotal += lineTotal;
            return `<tr><td>${escapeHtml(desc)}</td><td>${qty}</td><td>${formatRupiah(price)}</td><td>${formatRupiah(lineTotal)}</td></tr>`;
        }).join('');

        const grand = Math.max(0, subtotal - discount);

        const fmtDate = (s) => {
            if (!s) return '';
            const d = new Date(s + 'T00:00:00');
            return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        };

        area.innerHTML = `
            <div class="inv-doc-header">
                <div class="inv-doc-logo">
                    <img src="/images/logo.svg" onerror="this.style.display='none'" alt="">
                    <span>${escapeHtml(fromName)}</span>
                </div>
                <div class="inv-doc-title">
                    <h1>INVOICE</h1>
                    <div>No. ${escapeHtml(number)}</div>
                    <div>Tanggal: ${fmtDate(date)}</div>
                    ${due ? `<div>Jatuh tempo: ${fmtDate(due)}</div>` : ''}
                </div>
            </div>
            <div class="inv-doc-parties">
                <div><h4>Dari</h4>${escapeHtml(fromName)}\n${escapeHtml(fromContact)}</div>
                <div><h4>Kepada</h4>${escapeHtml(toName)}\n${escapeHtml(toContact)}</div>
            </div>
            <table class="inv-doc-table">
                <thead><tr><th>Item</th><th>Qty</th><th>Harga</th><th>Subtotal</th></tr></thead>
                <tbody>${itemsHtml}</tbody>
            </table>
            <div class="inv-doc-totals">
                <table>
                    <tr><td>Subtotal</td><td>${formatRupiah(subtotal)}</td></tr>
                    ${discount > 0 ? `<tr><td>Diskon</td><td>-${formatRupiah(discount)}</td></tr>` : ''}
                    <tr class="grand"><td>Total</td><td>${formatRupiah(grand)}</td></tr>
                </table>
            </div>
            ${notes ? `<div class="inv-doc-notes">${escapeHtml(notes)}</div>` : ''}
        `;
    }

    function wireInvoiceSection() {
        const itemsContainer = document.getElementById('inv-items');
        if (!itemsContainer) return;
        const addBtn        = document.getElementById('inv-add-row');
        const printBtn       = document.getElementById('inv-print-btn');
        const discountInput = document.getElementById('inv-discount');
        const numberInput   = document.getElementById('inv-number');
        const dateInput      = document.getElementById('inv-date');

        const today = new Date();
        dateInput.value = today.toISOString().slice(0, 10);
        numberInput.value = 'INV-' + today.toISOString().slice(0, 10).replace(/-/g, '') + '-001';

        itemsContainer.appendChild(makeInvoiceItemRow());
        recalcInvoiceTotals();

        addBtn.addEventListener('click', () => {
            itemsContainer.appendChild(makeInvoiceItemRow());
            recalcInvoiceTotals();
        });
        discountInput.addEventListener('input', recalcInvoiceTotals);

        printBtn.addEventListener('click', () => {
            const toName = document.getElementById('inv-to-name').value.trim();
            const rows = Array.from(itemsContainer.querySelectorAll('.inv-item-row'));
            const validItems = rows.filter(r => r.querySelector('.inv-item-desc').value.trim() && parseNum(r.querySelector('.inv-item-qty').value) > 0);
            if (!toName) { showToast('Isi nama klien dulu', 'error'); return; }
            if (validItems.length === 0) { showToast('Tambahkan minimal 1 item dengan qty > 0', 'error'); return; }
            buildPrintableInvoice();
            window.print();
        });
    }

    async function loadContent() {
        formArea.innerHTML = '<div class="loading">Memuat schema &amp; konten…</div>';
        originalValues = {};
        dirtyKeys.clear();
        try {
            const res = await fetch('/api/content', { cache: 'no-store' });
            if (res.status === 401) { await checkAuth(); return; }
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            formArea.innerHTML = '';

            // Account section first
            formArea.appendChild(makeAccountSection());
            wireAccountSection();

            // Invoice builder (pinned, no persistence)
            formArea.appendChild(makeInvoiceSection());
            wireInvoiceSection();

            // Then content sections
            if (data.sections && data.sections.length) {
                data.sections.forEach(s => formArea.appendChild(makeSection(s)));
            }
            updateDirty();
        } catch (err) {
            formArea.innerHTML = `<div class="loading">Gagal load: ${err.message}</div>`;
            showToast('Gagal load konten: ' + err.message, 'error');
        }
    }

    async function save() {
        if (dirtyKeys.size === 0) return;
        const changes = {};
        document.querySelectorAll('[data-key]').forEach(el => {
            if (dirtyKeys.has(el.dataset.key)) changes[el.dataset.key] = el.value;
        });

        btnSave.disabled = true;
        btnSave.textContent = 'Menyimpan…';
        try {
            const res = await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ changes }),
            });
            if (res.status === 401) { await checkAuth(); return; }
            const data = await res.json();
            if (!res.ok || !data.ok) throw new Error(data.error || 'Save failed');

            let toastMsg = `Tersimpan: ${data.applied.length} field${data.skipped.length ? ` · ${data.skipped.length} di-skip` : ''}`;
            if (data.committed && data.commitSha) {
                toastMsg += ` · commit ${data.commitSha} · Vercel redeploy ~30 dtk`;
            }
            showToast(toastMsg, 'success');

            for (const k of data.applied) {
                const el = document.querySelector(`[data-key="${k}"]`);
                if (el) originalValues[k] = el.value;
            }
            dirtyKeys.clear();
            document.querySelectorAll('.field.dirty').forEach(f => f.classList.remove('dirty'));
            updateDirty();
            lastSaved.textContent = 'tersimpan ' + new Date().toLocaleTimeString('id-ID');

            preview.src = '/preview-home.html?t=' + Date.now();
        } catch (err) {
            showToast('Gagal simpan: ' + err.message, 'error');
        } finally {
            btnSave.textContent = 'Simpan';
            btnSave.disabled = dirtyKeys.size === 0;
        }
    }

    btnSave.addEventListener('click', save);
    btnRefresh.addEventListener('click', () => loadContent());

    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); save(); }
    });

    window.addEventListener('beforeunload', (e) => {
        if (dirtyKeys.size > 0) { e.preventDefault(); e.returnValue = ''; }
    });

    checkAuth();
</script>
</body>
</html>
